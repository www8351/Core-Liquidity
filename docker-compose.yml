services:
  xauusd-bot:
    build: .
    container_name: xauusd-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=Asia/Jerusalem
    ports:
      - "8080:8080"   # dashboard (only served when DASHBOARD_TOKEN is set)
    volumes:
      - ./Research:/app/Research:ro
